<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex CRM - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-primary);
            margin: 0;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            text-align: center;
        }

        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 32px;
        }

        .role-btn {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid var(--surface-border);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }

        .role-btn.active {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1));
            border-color: #8b5cf6;
            color: var(--text-primary);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.1);
        }

        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>

    <div class="login-container panel glass">
        <div style="margin-bottom: 32px;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 16px;">
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#3b82f6" />
                        <stop offset="100%" stop-color="#8b5cf6" />
                    </linearGradient>
                </defs>
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <h1 style="font-size: 28px; font-weight: 700; margin-bottom: 8px;">Welcome Back</h1>
            <p style="color: var(--text-secondary); font-size: 15px;">Login to access your CRM</p>
        </div>

        <div class="role-selector" id="roleSelector">
            <button type="button" class="role-btn active" data-role="Director">Director</button>
            <button type="button" class="role-btn" data-role="Subadmin">Subadmin</button>
            <button type="button" class="role-btn" data-role="Team Leader">Team Leader</button>
            <button type="button" class="role-btn" data-role="Employee">Employee</button>
        </div>

        <form id="loginForm">
            <div class="form-group" style="text-align: left;">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            
            <div class="form-group" style="text-align: left; margin-top: 16px;">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>

            <div class="error-msg" id="errorMsg">Invalid username or password for the selected role.</div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 24px; padding: 14px; font-size: 16px;" id="loginBtn">Login to CRM</button>
        </form>
    </div>

    <script>
        let currentRole = 'Director';
        
        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentRole = this.getAttribute('data-role');
            });
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const btn = document.getElementById('loginBtn');
            
            errorMsg.style.display = 'none';

            if (currentRole === 'Director') {
                if (user === 'jaadugar' && (pass === 'username' || pass === 'jaadugar')) {
                    btn.innerText = 'Authenticating...';
                    btn.style.opacity = '0.8';
                    
                    setTimeout(() => {
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('userRole', 'Director');
                        window.location.href = 'index.html';
                    }, 800);
                } else {
                    errorMsg.style.display = 'block';
                }
            } else {
                errorMsg.innerText = currentRole + ' login is currently disabled.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
